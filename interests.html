<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interests — Manas Adepu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="interests">
  <div class="container">
    <a class="home" href="index.html">home</a>
    <h1>Interests</h1>

    <section class="film">
      <h2>Last 5 movies I watched</h2>
      <div id="lb-films" class="film-row">
        <span class="loading">loading…</span>
      </div>
    </section>

    <section class="freetime">
      <h2>In my free time</h2>
      <p>I like going to the gym, watching movies, and playing pickleball.</p>
    </section>
  </div>

  <script>
    // Set this to your Letterboxd username.
    const LETTERBOXD_USERNAME = "m_n_s";

    async function loadLastFilms() {
      const container = document.getElementById("lb-films");
      const rssUrl = `https://letterboxd.com/${LETTERBOXD_USERNAME}/rss/`;
      // Letterboxd's RSS sends no CORS headers, so read it through rss2json,
      // which returns clean JSON (and a poster thumbnail) with CORS allowed.
      const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

      try {
        const res = await fetch(api);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (data.status !== "ok" || !data.items?.length) {
          throw new Error("No films in feed.");
        }

        // rss2json drops Letterboxd's <watchedDate>, so order by pubDate (when
        // the entry was logged), newest first, before taking the last 5.
        const recent = data.items
          .slice()
          .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate))
          .slice(0, 5);

        const cards = recent.map((item) => {
          // Feed titles look like "Karuppu, 2026 - ★★★½"; split out the name and rating.
          const name = item.title.replace(/\s*-\s*★.*$/, "").replace(/,\s*\d{4}$/, "");
          // Stars run from the first ★ to the end, including a trailing ½ for half ratings.
          const rating = item.title.match(/★[★½]*/)?.[0] || "";
          // Poster lives in `thumbnail`, with a fallback to the <img> in the body.
          const poster = item.thumbnail ||
            new DOMParser().parseFromString(item.description || "", "text/html")
              .querySelector("img")?.src;

          const posterEl = poster
            ? `<img src="${poster}" alt="${name} poster">`
            : `<span class="loading">No poster</span>`;
          const ratingEl = rating
            ? `<figcaption class="stars">${rating}</figcaption>`
            : "";

          return `<figure class="film-card">
            ${posterEl}
            ${ratingEl}
            <figcaption class="film-name">${name}</figcaption>
          </figure>`;
        });

        container.innerHTML = cards.join("");
      } catch (err) {
        container.innerHTML = `<span class="loading">Couldn't load (${err.message}).</span>`;
      }
    }

    loadLastFilms();
  </script>
</body>
</html>
